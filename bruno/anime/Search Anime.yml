info:
  name: Search Anime
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/anime/search?q=death+note"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  params:
    - name: q
      value: death+note
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
