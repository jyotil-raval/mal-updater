info:
  name: Sync Watchlist
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/sync"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  body:
    type: json
    data: |-
      {
        "watchlist": [
          { "mal_id": 57181, "watchListType": 1 }
        ],
        "dry_run": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
